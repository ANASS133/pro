<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Job Scraper</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 100px 20px 40px;
        }
        .navbar {
            max-width: 900px;
            margin: 0 auto 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            display: flex;
            gap: 10px;
            padding: 10px 14px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }
        .nav-link {
            color: #2f3a56;
            text-decoration: none;
            font-weight: 700;
            padding: 8px 12px;
            border-radius: 6px;
        }
        .nav-link.active {
            background: #667eea;
            color: #fff;
        }
        .error-box {
            background: #fff;
            padding: 40px;
            border-radius: 10px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            margin: 0 auto;
        }
        h1 {
            color: #e74c3c;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            word-break: break-word;
        }
        .button {
            display: inline-block;
            padding: 12px 30px;
            background: #667eea;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .button:hover {
            background: #764ba2;
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='shared_nav.css') }}">
    <script src="{{ url_for('static', filename='shared_nav.js') }}" defer></script>
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('index') }}" class="nav-link active">Get Emails</a>
        <a href="{{ url_for('firebase_page') }}" class="nav-link">Firebase</a>
        <a href="{{ url_for('money') }}" class="nav-link">Money</a>
        <a href="{{ url_for('create_anschreibens') }}" class="nav-link">Create Anschreibens</a>
        <a href="{{ url_for('send_emails') }}" class="nav-link">Send Emails</a>
        <a href="{{ url_for('dashboard') }}" class="nav-link">Dashboard</a>
        <a href="{{ url_for('ausbildungen') }}" class="nav-link">Ausbildungen</a>
    </nav>
    <div class="error-box">
        <h1>Oops! Something went wrong</h1>
        <p>{{ error }}</p>
        <a href="{{ url_for('index') }}" class="button">Try Again</a>
    </div>
</body>
</html>
